<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ELR 누설전류 저감 솔루션</title>
<style>
body{margin:0;font-family:sans-serif;background:#0b1020;color:#fff}
.hero{padding:60px 20px;text-align:center;background:linear-gradient(135deg,#0b1020,#1e3a8a)}
h1{font-size:48px;margin:0}
.sub{font-size:20px;opacity:.9}
.counter{font-size:84px;font-weight:bold;color:#ef4444;margin:30px 0}
.section{padding:50px 20px;max-width:1100px;margin:auto}
.cards{display:flex;gap:16px;flex-wrap:wrap}
.card{flex:1;min-width:200px;background:#18223d;padding:20px;border-radius:12px}
.btn{background:#2563eb;color:white;padding:14px 22px;border-radius:8px;text-decoration:none}
.footer{text-align:center;padding:30px;background:#111827}
</style>
</head>
<body>
<div class="hero">
<h1>ELR 누설전류 저감 솔루션</h1>
<p class="sub">실제 현장 측정 사례 기반</p>
<div id="counter" class="counter">60mA</div>
<p>설치 후 목표 측정 사례: <span style="color:#22c55e;font-weight:bold">4mA</span></p>
<p><button onclick="run()" class="btn">시뮬레이션 실행</button></p>
</div>

<div class="section">
<h2>제품 소개</h2>
<p>ELR은 산업설비의 누설전류 현황을 분석하고 현장 테스트를 지원하는 솔루션입니다.</p>
<p><b>제품 사진 위치</b> (실제 배포 시 제공된 사진으로 교체)</p>
<div style="border:2px dashed #666;padding:40px;text-align:center">ELR 제품 이미지</div>
</div>

<div class="section">
<h2>적용 분야</h2>
<div class="cards">
<div class="card">자동화 설비</div>
<div class="card">서보 시스템</div>
<div class="card">인버터 설비</div>
<div class="card">엘리베이터</div>
</div>
</div>

<div class="section">
<h2>현장 문의</h2>
<p>(주)이엘피코리아</p>
<p>전화: 043-241-1236</p>
</div>

<div class="footer">© ELP Korea</div>

<script>
function run(){
 let n=60;
 const e=document.getElementById('counter');
 e.style.color='#ef4444';
 const t=setInterval(()=>{
   n--;
   e.innerText=n+'mA';
   if(n<=4){
      e.innerText='4mA';
      e.style.color='#22c55e';
      clearInterval(t);
   }
 },60);
}
</script>
</body>
</html>
